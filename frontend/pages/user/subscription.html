<!DOCTYPE html>
<html lang="id" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Status Langganan - Pilih.in</title>
        <script>(function(){var t=localStorage.getItem("pilih-in-theme");if(t)document.documentElement.setAttribute("data-theme",t);})();</script>

        <!-- Google Sans Flex -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@100..900&display=swap"
            rel="stylesheet"
        />

        <!-- CSS: reset → design-system → components → page -->
        <link rel="stylesheet" href="../../css/reset.css" />
        <link rel="stylesheet" href="../../css/design-system.css" />
        <link rel="stylesheet" href="../../css/components/sidebar.css" />
        <link rel="stylesheet" href="../../css/components/button.css" />
        <link rel="stylesheet" href="../../css/pages/user-profile.css" />
        <link rel="stylesheet" href="../../css/pages/user-subscription.css" />
    </head>
    <body>
        <div class="user-layout">
            <!-- Sidebar Kiri User -->
            <aside class="user-sidebar" id="userSidebar">
                <!-- Dirender oleh SubscriptionPage._renderSidebar() -->
            </aside>

            <!-- Konten Utama -->
            <div class="user-main">
                <main id="subscriptionMain">
                    <!-- Dirender oleh SubscriptionPage._renderPage() -->
                </main>
            </div>
        </div>

        <!-- Feather Icons CDN -->
        <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>

        <!-- Page Logic -->
        <script type="module">
            import SubscriptionPage from "../../js/logic-pages/subscription.js";
            new SubscriptionPage();
        </script>
    </body>
</html>
