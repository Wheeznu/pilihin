<!DOCTYPE html>
<html lang="id" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Profil Saya - Pilih.in</title>
        <script>(function(){var t=localStorage.getItem("pilih-in-theme");if(t)document.documentElement.setAttribute("data-theme",t);})();</script>

        <!-- Google Sans Flex -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@100..900&display=swap"
            rel="stylesheet"
        />

        <!-- CSS: reset → design-system → components → page -->
        <link rel="stylesheet" href="../../css/reset.css" />
        <link rel="stylesheet" href="../../css/design-system.css" />
        <link rel="stylesheet" href="../../css/components/sidebar.css" />
        <link rel="stylesheet" href="../../css/components/navbar.css" />
        <link rel="stylesheet" href="../../css/components/button.css" />
        <link rel="stylesheet" href="../../css/components/footer.css" />
        <link rel="stylesheet" href="../../css/pages/user-profile.css" />
    </head>
    <body>
        <div id="navbar-container"></div>
        <main id="profileMain"></main>
        <div id="footer-container"></div>

        <!-- Feather Icons CDN -->
        <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>

        <!-- Page Logic -->
        <script type="module">
            import Navbar from "../../js/components/navbar.js";
            import Footer from "../../js/components/footer.js";
            import UserProfilePage from "../../js/logic-pages/user-profile.js";
            document.addEventListener("DOMContentLoaded", async () => {
                await Navbar.load("navbar-container");
                await Footer.load("footer-container");
                feather.replace();
                new UserProfilePage();
            });
        </script>
    </body>
</html>
