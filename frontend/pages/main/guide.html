<!DOCTYPE html>
<html lang="id">
    <head>
<script>document.documentElement.setAttribute("data-theme",localStorage.getItem("pilih-in-theme")||"dark")</script>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Panduan Pengguna - Pilih.in</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@100..900&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="../../css/reset.css" />
        <link rel="stylesheet" href="../../css/design-system.css" />
        <link rel="stylesheet" href="../../css/components/navbar.css" />
        <link rel="stylesheet" href="../../css/components/footer.css" />
        <link rel="stylesheet" href="../../css/components/button.css" />
        <link rel="stylesheet" href="../../css/pages/panduan.css" />
    </head>
    <body>
        <div class="app-layout">
            <div class="app-main">
                <div id="navbar-container"></div>
                <main class="panduan-page" id="panduanPage">
                    <div class="panduan-hero">
                        <h1>Panduan Pengguna</h1>
                        <p>Pelajari cara menggunakan Pilih.in dari awal hingga mahir</p>
                    </div>

                    <div class="panduan-layout">
                        <aside class="panduan-sidebar" id="panduanSidebar">
                            <nav class="panduan-nav">
                                <h3 class="panduan-nav__title">Daftar Isi</h3>
                                <ul class="panduan-nav__list" id="panduanNav"></ul>
                            </nav>
                        </aside>

                        <div class="panduan-content" id="panduanContent"></div>
                    </div>
                </main>
                <div id="footer-container"></div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
        <script type="module">
            import Navbar from "../../js/components/navbar.js";
            import Footer from "../../js/components/footer.js";
            import PanduanPage from "../../js/logic-pages/panduan.js";
            document.addEventListener("DOMContentLoaded", async () => {
                await Navbar.load("navbar-container");
                await Footer.load("footer-container");
                feather.replace();
                new PanduanPage();
            });
        </script>
    </body>
</html>
