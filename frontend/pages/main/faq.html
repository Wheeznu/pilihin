<!doctype html>
<html lang="id">
    <head>
        <script>
            document.documentElement.setAttribute(
                "data-theme",
                localStorage.getItem("pilih-in-theme") || "dark",
            );
        </script>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>FAQ - Pilih.in</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@100..900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="../../css/reset.css" />
        <link rel="stylesheet" href="../../css/design-system.css" />
        <link rel="stylesheet" href="../../css/components/navbar.css" />
        <link rel="stylesheet" href="../../css/components/button.css" />
        <link rel="stylesheet" href="../../css/components/footer.css" />
        <link rel="stylesheet" href="../../css/pages/faq.css" />
    </head>
    <body>
        <div id="navbar-container"></div>
        <main class="faq-page">
            <div class="faq-deco faq-deco--1"></div>
            <div class="faq-deco faq-deco--2"></div>

            <section class="page-hero">
                <span class="page-hero__brand"
                    >Pilih<span class="text-primary">.in</span></span
                >
                <h1>Pertanyaan <span class="text-primary">Umum</span></h1>
                <p>Temukan jawaban untuk pertanyaan yang sering diajukan</p>
            </section>

            <div class="faq-search">
                <i data-feather="search"></i>
                <input
                    type="text"
                    id="faqSearch"
                    placeholder="Cari pertanyaan..."
                />
            </div>

            <div class="faq-categories" id="faqCategories"></div>

            <div class="faq-list" id="faqList"></div>
        </main>
        <div id="footer-container"></div>
        <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
        <script type="module">
            import Navbar from "../../js/components/navbar.js";
            import Footer from "../../js/components/footer.js";
            import FaqPage from "../../js/logic-pages/faq.js";
            import { getDbReady } from "../../../backend/init.js";
            document.addEventListener("DOMContentLoaded", async () => {
                await Navbar.load("navbar-container");
                await Footer.load("footer-container");
                await getDbReady();
                feather.replace();
                new FaqPage();
            });
        </script>

    </body>
</html>
