<!DOCTYPE html>
<html lang="id" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Masuk - Pilih.in</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@100..900&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="../../css/reset.css" />
        <link rel="stylesheet" href="../../css/design-system.css" />
        <link rel="stylesheet" href="../../css/components/button.css" />
        <link rel="stylesheet" href="../../css/pages/auth.css" />
    </head>
    <body>
        <div class="auth-split">
            <div class="auth-split__deco auth-split__deco--1"></div>
            <div class="auth-split__deco auth-split__deco--2"></div>
            <div class="auth-split__deco auth-split__deco--3"></div>

            <div class="auth-split__hero">
                <div class="auth-split__hero-content">
                    <a href="../../index.html" class="auth-split__brand">
                        Pilih<span class="text-primary">.in</span>
                    </a>
                    <h1 class="auth-split__hero-title">Selamat Datang</h1>
                    <p class="auth-split__hero-text">
                        Nikmati ribuan film Indonesia berkualitas tinggi kapan saja dan di mana saja.
                    </p>

                    <div class="auth-split__features">
                        <div class="auth-split__feature">
                            <i data-feather="film"></i>
                            <span>Ribuan film & series</span>
                        </div>
                        <div class="auth-split__feature">
                            <i data-feather="monitor"></i>
                            <span>Kualitas HD & 4K</span>
                        </div>
                        <div class="auth-split__feature">
                            <i data-feather="refresh-cw"></i>
                            <span>Update tiap minggu</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="auth-split__form">
                <div class="auth-form-container">
                    <div class="auth-form-header">
                        <a href="../../index.html" class="auth-form-logo">
                            Pilih<span class="text-primary">.in</span>
                        </a>
                        <p class="auth-form-tagline">Masuk ke akun Anda</p>
                    </div>

                    <div class="auth-alert" id="loginAlert" hidden>
                        <span id="loginAlertText"></span>
                    </div>

                    <form class="auth-form" id="loginForm" novalidate>
                        <div class="form-group">
                            <label class="form-label" for="email">Email</label>
                            <div class="form-input-wrapper">
                                <i data-feather="mail" class="form-input-icon"></i>
                                <input
                                    type="email"
                                    id="email"
                                    name="email"
                                    class="form-input"
                                    placeholder="contoh@email.com"
                                    autocomplete="email"
                                    required
                                />
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="password">Password</label>
                            <div class="form-input-wrapper">
                                <i data-feather="lock" class="form-input-icon"></i>
                                <input
                                    type="password"
                                    id="password"
                                    name="password"
                                    class="form-input"
                                    placeholder="Masukkan password"
                                    autocomplete="current-password"
                                    required
                                />
                                <button
                                    type="button"
                                    class="password-toggle"
                                    id="togglePassword"
                                    aria-label="Tampilkan password"
                                >
                                    <i data-feather="eye"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary auth-submit" id="loginSubmit">
                            <i data-feather="log-in"></i> Masuk
                        </button>
                    </form>

                    <div class="auth-social">
                        <p class="auth-social__label">Atau masuk dengan</p>
                        <div class="auth-social__buttons">
                            <a href="404.html" class="btn btn-ghost auth-social__btn">
                                Google
                            </a>
                            <a href="404.html" class="btn btn-ghost auth-social__btn">
                                Facebook
                            </a>
                        </div>
                    </div>

                    <div class="auth-footer">
                        <p>Belum punya akun? <a href="register.html">Daftar</a></p>
                        <p><a href="forgot-password.html">Lupa password?</a></p>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>

        <script type="module">
            import LoginPage from "../../js/logic-pages/login.js";
            feather.replace();
            new LoginPage();
        </script>
    </body>
</html>
