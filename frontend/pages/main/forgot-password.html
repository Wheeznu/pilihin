<!DOCTYPE html>
<html lang="id" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lupa Password - Pilih.in</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@100..900&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="../../css/reset.css" />
        <link rel="stylesheet" href="../../css/design-system.css" />
        <link rel="stylesheet" href="../../css/components/button.css" />
        <link rel="stylesheet" href="../../css/pages/auth.css" />
    </head>
    <body>
        <div class="auth-page">
            <div class="auth-card">
                <div class="auth-brand">
                    <a href="../../index.html" class="auth-brand__logo">
                        Pilih<span class="text-primary">.in</span>
                    </a>
                    <p class="auth-brand__tagline">
                        Reset password akun Anda
                    </p>
                </div>

                <!-- Form Card -->
                <div id="formCard">
                    <p class="auth-description">
                        Masukkan alamat email yang terdaftar. Kami akan mengirimkan
                        tautan untuk mereset password Anda.
                    </p>

                    <div class="auth-alert" id="forgotAlert" hidden>
                        <span id="forgotAlertText"></span>
                    </div>

                    <form class="auth-form" id="forgotForm" novalidate>
                        <div class="form-group">
                            <label class="form-label" for="email">Email</label>
                            <div class="form-input-wrapper">
                                <i data-feather="mail" class="form-input-icon"></i>
                                <input
                                    type="email"
                                    id="email"
                                    name="email"
                                    class="form-input"
                                    placeholder="contoh@email.com"
                                    autocomplete="email"
                                    required
                                />
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary auth-submit" id="forgotSubmit">
                            <i data-feather="send"></i> Kirim Tautan Reset
                        </button>
                    </form>

                    <div class="auth-footer">
                        <p><a href="login.html">Kembali ke Login</a></p>
                    </div>
                </div>

                <!-- Success Card -->
                <div id="successCard" hidden>
                    <div class="auth-success">
                        <div class="auth-success__icon">
                            <i data-feather="check-circle"></i>
                        </div>
                        <h2 class="auth-success__title">Cek Email Anda</h2>
                        <p class="auth-success__text">
                            Kami telah mengirimkan tautan reset password ke
                            <strong id="userEmail" class="text-primary"></strong>.
                            Silakan cek inbox atau folder spam Anda.
                        </p>
                        <a href="login.html" class="btn btn-primary">
                            <i data-feather="arrow-left"></i> Kembali ke Login
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>

        <script type="module">
            import ForgotPasswordPage from "../../js/logic-pages/forgot-password.js";
            new ForgotPasswordPage();
        </script>
    </body>
</html>
