<!DOCTYPE html>
<html lang="id" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Daftar - Pilih.in</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@100..900&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="../../css/reset.css" />
        <link rel="stylesheet" href="../../css/design-system.css" />
        <link rel="stylesheet" href="../../css/components/button.css" />
        <link rel="stylesheet" href="../../css/pages/auth.css" />
    </head>
    <body>
        <div class="auth-page">
            <div class="auth-card">
                <div class="auth-brand">
                    <a href="../../index.html" class="auth-brand__logo">
                        Pilih<span class="text-primary">.in</span>
                    </a>
                    <p class="auth-brand__tagline">
                        Buat akun untuk menikmati ribuan film Indonesia
                    </p>
                </div>

                <div class="auth-alert" id="registerAlert" hidden>
                    <span id="registerAlertText"></span>
                </div>

                <form class="auth-form" id="registerForm" novalidate>
                    <div class="form-group">
                        <label class="form-label" for="username">Username</label>
                        <div class="form-input-wrapper">
                            <i data-feather="at-sign" class="form-input-icon"></i>
                            <input
                                type="text"
                                id="username"
                                name="username"
                                class="form-input"
                                placeholder="pilih_username"
                                autocomplete="username"
                                required
                            />
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <div class="form-input-wrapper">
                            <i data-feather="mail" class="form-input-icon"></i>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                class="form-input"
                                placeholder="contoh@email.com"
                                autocomplete="email"
                                required
                            />
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <div class="form-input-wrapper">
                            <i data-feather="lock" class="form-input-icon"></i>
                            <input
                                type="password"
                                id="password"
                                name="password"
                                class="form-input"
                                placeholder="Minimal 6 karakter"
                                autocomplete="new-password"
                                required
                            />
                            <button
                                type="button"
                                class="password-toggle"
                                id="togglePassword"
                                aria-label="Tampilkan password"
                            >
                                <i data-feather="eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="confirmPassword">Konfirmasi Password</label>
                        <div class="form-input-wrapper">
                            <i data-feather="lock" class="form-input-icon"></i>
                            <input
                                type="password"
                                id="confirmPassword"
                                name="confirmPassword"
                                class="form-input"
                                placeholder="Ulangi password"
                                autocomplete="new-password"
                                required
                            />
                            <button
                                type="button"
                                class="password-toggle"
                                id="toggleConfirmPassword"
                                aria-label="Tampilkan konfirmasi password"
                            >
                                <i data-feather="eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary auth-submit" id="registerSubmit">
                        <i data-feather="user-plus"></i> Daftar
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Sudah punya akun? <a href="login.html">Masuk</a></p>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>

        <script type="module">
            import RegisterPage from "../../js/logic-pages/register.js";
            new RegisterPage();
        </script>
    </body>
</html>
