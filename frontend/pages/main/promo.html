<!DOCTYPE html>
<html lang="id">
    <head>
<script>document.documentElement.setAttribute("data-theme",localStorage.getItem("pilih-in-theme")||"dark")</script>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Promo - Pilih.in</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@100..900&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="../../css/reset.css" />
        <link rel="stylesheet" href="../../css/design-system.css" />
        <link rel="stylesheet" href="../../css/components/navbar.css" />
        <link rel="stylesheet" href="../../css/components/button.css" />
        <link rel="stylesheet" href="../../css/components/footer.css" />
        <link rel="stylesheet" href="../../css/pages/promo.css" />
    </head>
    <body>
        <div id="navbar-container"></div>

        <main class="promo-page">
            <div class="promo-carousel" id="promoCarousel"></div>

            <div class="promo-section-header">
                <h2 class="promo-section-header__title">Semua <span class="text-primary">Promo</span></h2>
                <p class="promo-section-header__subtitle">Jangan lewatkan penawaran terbaik dari Pilih.in. Hemat lebih banyak dengan promo-promo menarik!</p>
            </div>

            <div class="promo-grid" id="promoGrid">
                <div class="promo-loading">
                    <i data-feather="loader"></i>
                    <p>Memuat promo...</p>
                </div>
            </div>
        </main>

        <div id="footer-container"></div>

        <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>

        <script type="module">
            import Navbar from "../../js/components/navbar.js";
            import Footer from "../../js/components/footer.js";
            import PromoPage from "../../js/logic-pages/promo.js";
            document.addEventListener("DOMContentLoaded", async () => {
                await Navbar.load("navbar-container");
                await Footer.load("footer-container");
                feather.replace();
                new PromoPage();
            });
        </script>
    </body>
</html>
