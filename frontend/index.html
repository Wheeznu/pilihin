<!-- Version: 2.4 - Navbar: opacity adjusted to 0.9 -->
<!doctype html>
<html lang="id">
    <head>
<script>document.documentElement.setAttribute("data-theme",localStorage.getItem("pilih-in-theme")||"dark")</script>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Pilih.in - Streaming Film Indonesia</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@100..900&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="css/reset.css" />
        <link rel="stylesheet" href="css/design-system.css" />
        <link rel="stylesheet" href="css/components/navbar.css" />
        <link rel="stylesheet" href="css/components/button.css" />
        <link rel="stylesheet" href="css/components/card.css" />
        <link rel="stylesheet" href="css/components/footer.css" />
        <link rel="stylesheet" href="css/pages/home.css" />
    </head>
    <body>
        <div class="app-layout">
            <div class="app-main">
                <div id="navbar-container"></div>

                <!-- Main Content -->
                <main class="page-content">
                    <!-- Hero Carousel -->
                    <section class="hero-carousel" id="heroCarousel">
                        <div class="hero-carousel__track" id="heroTrack">
                            <!-- Slides populated by JS -->
                        </div>
                        <div class="hero-carousel__dots" id="heroDots"></div>
                    </section>

                    <!-- Trending Section -->
                    <section class="section">
                        <div class="section__header">
                            <h2 class="section__title">
                                <i data-feather="trending-up"></i> Trending
                            </h2>
                            <a href="/frontend/pages/film/katalog.html" class="section__link">
                                Lihat Semua <i data-feather="arrow-right"></i>
                            </a>
                        </div>
                        <div class="film-grid" id="trendingGrid"></div>
                    </section>

                    <!-- Latest Section -->
                    <section class="section">
                        <div class="section__header">
                            <h2 class="section__title">
                                <i data-feather="clock"></i> Terbaru
                            </h2>
                            <a href="/frontend/pages/film/katalog.html" class="section__link">
                                Lihat Semua <i data-feather="arrow-right"></i>
                            </a>
                        </div>
                        <div class="film-grid" id="latestGrid"></div>
                    </section>

                    <!-- Artikel Section -->
                    <section class="section">
                        <div class="section__header">
                            <h2 class="section__title">
                                <i data-feather="file-text"></i> Artikel Pilihan
                            </h2>
                            <a href="/frontend/pages/main/artikel.html" class="section__link">
                                Lihat Semua <i data-feather="arrow-right"></i>
                            </a>
                        </div>
                        <div class="content-grid" id="articleGrid"></div>
                    </section>

                    <!-- Berita Section -->
                    <section class="section">
                        <div class="section__header">
                            <h2 class="section__title">
                                <i data-feather="radio"></i> Berita Terkini
                            </h2>
                            <a href="/frontend/pages/main/artikel.html" class="section__link">
                                Lihat Semua <i data-feather="arrow-right"></i>
                            </a>
                        </div>
                        <div class="content-grid" id="newsGrid"></div>
                    </section>
                </main>

                <div id="footer-container"></div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>

        <script type="module" src="js/main.js"></script>
    </body>
</html>
